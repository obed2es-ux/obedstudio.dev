<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Obed Studio</title>
<meta name="description" content="Obed Studio — apps hechas con cariño. Creadores de Macro, el diario de nutrición para la comida real.">
<link rel="icon" type="image/png" sizes="64x64" href="/macro/assets/icon-64.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--red:#C53A28;--red-deep:#A82E1E;--cream-deep:#EFE6D2;--masa:#E7DCC5;--cream-shadow:#DED1B6;--card:#FCF8EF;--ink:#2E2620;--ink-soft:#9A8C76;--line-2:#DCCFB4;--serif:'Newsreader',Georgia,serif;--sans:'Hanken Grotesk',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);color:var(--ink);min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;background:radial-gradient(120% 80% at 50% 0%,var(--cream-deep),var(--masa) 55%,var(--cream-shadow)) fixed}
h1{font-family:var(--serif);font-size:clamp(36px,7vw,54px);font-weight:700;color:var(--ink);line-height:1.05}
.sub{color:var(--ink-soft);font-weight:500;font-size:17px;margin:14px 0 44px}
.app{display:flex;align-items:center;gap:20px;background:var(--card);border-radius:22px;box-shadow:0 14px 30px rgba(80,52,24,.18);padding:26px 30px;max-width:460px;width:100%;text-align:left;text-decoration:none;color:inherit;transition:transform .2s ease}
.app:hover{transform:translateY(-4px)}
.app img{width:72px;height:72px;border-radius:18px;box-shadow:0 6px 16px rgba(122,98,52,.2)}
.app h2{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--red)}
.app p{font-size:14px;color:var(--ink-soft);font-weight:500;margin-top:4px}
.app .go{margin-left:auto;font-family:var(--serif);font-size:26px;color:var(--red)}
footer{margin-top:56px;font-size:13px;color:var(--ink-soft);font-weight:600}
footer a{color:inherit}
</style>
</head>
<body>
  <h1>Obed Studio</h1>
  <p class="sub">Apps hechas con cariño.</p>
  <a class="app" href="/macro/">
    <img src="/macro/assets/icon-180.png" alt="Ícono de Macro">
    <div>
      <h2>Macro</h2>
      <p>Una foto. Tus macros. El diario de nutrición para la comida real.</p>
    </div>
    <span class="go">→</span>
  </a>
  <footer><a href="/privacy/">Privacidad</a> · <a href="/terms/">Términos</a> · <a href="/macro/support/">Soporte</a></footer>
</body>
</html>
